# ============================================================================
# CustDevAI production Nginx — reverse-proxy + TLS termination + SPA hosting
# ----------------------------------------------------------------------------
# Используется стадией `serve` в docker/web.Dockerfile. Файл попадает в
# /etc/nginx/templates/ и обрабатывается envsubst при старте контейнера:
#   ${NGINX_API_UPSTREAM} — api:8000 (внутренняя docker-сеть)
#   ${NGINX_SERVER_NAME}  — публичное DNS-имя (например, custdevai.example.com)
#
# TLS-сертификаты Let's Encrypt монтируются с хоста по пути /etc/nginx/certs/.
# Получение/обновление — через certbot на хост-машине; nginx читает уже
# готовые fullchain.pem и privkey.pem.
# ============================================================================

# Редирект HTTP → HTTPS (NFR-SEC-01).
server {
    listen 80;
    listen [::]:80;
    server_name ${NGINX_SERVER_NAME};

    # Allow ACME http-01 challenge для certbot renew.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Основной HTTPS-сервер.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${NGINX_SERVER_NAME};

    # ----- TLS ---------------------------------------------------------------
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern crypto (Mozilla intermediate, TLS 1.2+1.3).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (NFR-SEC-01).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 16M;
    keepalive_timeout 60s;

    # ----- API ---------------------------------------------------------------
    # FastAPI слушает на :8000 внутри docker-сети; пробрасываем сюда.
    location /api/ {
        proxy_pass http://${NGINX_API_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Critical: API должен знать, что клиент пришёл по https,
        # чтобы выставлять Secure-cookie корректно.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # ----- Health (для внешнего мониторинга) ---------------------------------
    location /health {
        proxy_pass http://${NGINX_API_UPSTREAM}/health;
        access_log off;
    }

    # ----- SPA ---------------------------------------------------------------
    # React-Router v6 client-side routes; неизвестные пути отдают index.html.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статики (assets с хешем имени, безопасно кэшировать долго).
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # gzip для JSON / HTML / JS — снижает payload SPA при первом заходе.
    gzip on;
    gzip_types application/javascript application/json text/css text/html text/plain image/svg+xml;
    gzip_vary on;
    gzip_min_length 1024;
}
